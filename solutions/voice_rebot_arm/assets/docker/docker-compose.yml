# voice_rebot_arm — full voice-controlled grasping stack (Jetson Orin NX).
#
# Four services, one network. Container names are load-bearing: the agent
# resolves its peers as http://edge-llm:8000 / http://seeed-voice:8000 and
# reaches the warehouse MCP at http://mcp_warehouse:2125.
#
# Prerequisites on the host (see the solution guide):
#   1. /opt/rebot-models/yoloe-26s-seg-multi.onnx  — multi-class detector
#      (downloaded from HuggingFace; guide step does this)
#   2. /opt/rebot-models/hand_eye.npz              — per-device hand-eye
#      calibration (MANUAL, one-time; printed ArUco board required)
#   3. reBot B601-DM arm on ${REBOT_SERIAL} (default /dev/ttyACM0),
#      Orbbec Gemini2 on USB, reSpeaker mic + speaker via PulseAudio
#
# China networks: set HF_ENDPOINT=https://hf-mirror.com in .env (the edge-llm
# engine and speech models auto-download from HuggingFace on first start).

services:
  edge-llm:
    image: sensecraft-missionpack.seeed.cn/solution/edge-llm-chat-service:v0.3.0
    container_name: edge-llm
    privileged: true            # TensorRT needs full GPU device access
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - EDGELLM_MODEL_NAME=Qwen/Qwen3-4B-AWQ
      # TensorRT engine auto-downloads from HF into /workspace on first boot
      - EDGELLM_ENGINE_REPO=harvestsu/Qwen3-4B-AWQ-TensorRT-EdgeLLM-engine
      - EDGELLM_ENGINE_REVISION=main
      - EDGELLM_ENGINE_DIR=/workspace/Qwen3-4B-AWQ/engines-3072
      - HF_ENDPOINT=${HF_ENDPOINT:-https://huggingface.co}
      - WARMUP_TIMEOUT=180
      - WARMUP_INFERENCE_TIMEOUT=300
      - PYTHONUNBUFFERED=1
    volumes:
      - edgellm-workspace:/workspace
      - /usr/local/cuda/lib64:/host-cuda:ro
      - /usr/local/cuda/targets/aarch64-linux/lib:/host-cudla:ro
      - /lib/aarch64-linux-gnu:/host-libs:ro
      - /usr/lib/aarch64-linux-gnu/nvidia:/host-nvidia-libs:ro
    restart: unless-stopped

  seeed-voice:
    image: sensecraft-missionpack.seeed.cn/solution/seeed-local-voice:prod-unified-v8
    container_name: seeed-voice
    runtime: nvidia
    ipc: host
    ports:
      - "8621:8000"
    environment:
      - OVS_PROFILE=jetson-qwen3asr-matcha-nx
      - LANGUAGE_MODE=multilanguage
      - HF_ENDPOINT=${HF_ENDPOINT:-https://huggingface.co}
      - TTS_PROVIDER=cuda
      - TTS_DEFAULT_SID=52
      - TTS_DEFAULT_SPEED=1.0
      - TTS_NUM_THREADS=4
      - STREAMING_ASR_PROVIDER=cuda
      - STREAMING_ASR_NUM_THREADS=4
      - PARAFORMER_PREROLL_MS=100
      - CUDA_MODULE_LOADING=LAZY
      - ORT_CUDA_ARENA_EXTEND_STRATEGY=kSameAsRequested
      - LD_LIBRARY_PATH=/usr/local/lib/python3.10/dist-packages/onnxruntime/capi:/host-cuda:/host-nvidia-libs:/host-libs
      - PYTHONPATH=/opt/speech:/usr/lib/python3.10/dist-packages
    volumes:
      - speech-models:/opt/models
      - /usr/local/cuda/lib64:/host-cuda:ro
      - /usr/lib/aarch64-linux-gnu/nvidia:/host-nvidia-libs:ro
      - /lib/aarch64-linux-gnu:/host-libs:ro
      - /usr/lib/python3.10/dist-packages/tensorrt:/usr/lib/python3.10/dist-packages/tensorrt:ro
      - /usr/src/tensorrt:/usr/src/tensorrt:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 6G

  warehouse:
    image: sensecraft-missionpack.seeed.cn/solution/warehouse:latest
    container_name: mcp_warehouse
    ports:
      - "2125:2125"
    environment:
      - PORT=2125
      - DATABASE_PATH=/data/warehouse.db
      - INIT_MOCK_DATA=${INIT_MOCK_DATA:-false}
      - ENABLE_SECURITY_HEADERS=true
      - CORS_ORIGINS=*
    volumes:
      - warehouse_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:2125/healthz', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # One-shot init: fetch the multi-class detector ONNX into /opt/rebot-models
  # if missing (idempotent). Reuses the main image — no extra pull. On China
  # networks set HF_ENDPOINT=https://hf-mirror.com in .env.
  model-init:
    image: ddandadan/voice-rebot-arm:v1.0.0
    entrypoint: ["python3", "-c"]
    command:
      - |
        import os, sys, urllib.request
        dst = "/opt/rebot-models/yoloe-26s-seg-multi.onnx"
        if os.path.exists(dst) and os.path.getsize(dst) == 41803496:
            print("model present, skipping"); sys.exit(0)
        base = os.environ.get("HF_ENDPOINT", "https://huggingface.co").rstrip("/")
        url = base + "/Dan-Da-Dan/yoloe-26s-seg-multi/resolve/main/yoloe-26s-seg-multi.onnx"
        print("downloading", url)
        urllib.request.urlretrieve(url, dst + ".part")
        os.replace(dst + ".part", dst)
        print("done:", os.path.getsize(dst), "bytes")
    environment:
      - HF_ENDPOINT=${HF_ENDPOINT:-https://huggingface.co}
    volumes:
      - /opt/rebot-models:/opt/rebot-models
    restart: "no"

  rebot-arm:
    image: ddandadan/voice-rebot-arm:v1.0.0
    container_name: voice-rebot-arm
    privileged: true            # arm serial + camera USB + audio devices
    depends_on:
      model-init:
        condition: service_completed_successfully
      edge-llm:
        condition: service_started
      seeed-voice:
        condition: service_started
      warehouse:
        condition: service_started
    ports:
      - "8775:8775"             # action/observation HTTP server
      - "8776:8776"             # read-only camera/arm dashboard
    devices:
      - ${REBOT_SERIAL:-/dev/ttyACM0}:/dev/ttyACM0
      - /dev/snd:/dev/snd
    environment:
      # ── peer services (compose DNS names) ──
      - LLM_SERVICE_URL=http://edge-llm:8000
      - LLM_SERVICE_HOST=edge-llm
      - LLM_SERVICE_PORT=8000
      - VOICE_SERVICE_URL=http://seeed-voice:8000
      - VOICE_SERVICE_HOST=seeed-voice
      - VOICE_SERVICE_PORT=8000
      # ── audio (host PulseAudio; PULSE_UID = host user's numeric uid) ──
      - PULSE_SERVER=unix:/run/pulse/native
      - PULSE_COOKIE=/tmp/pulse-cookie
      - MIC_INDEX=0
      - MIC_CHANNELS=6
      - MIC_CHANNEL_SELECT=0
      - WAKEWORD_MODEL=hey jarvis
      # ── arm + grasp (verified device state, 2026-07-07) ──
      - REBOT_CHANNEL=auto
      - REBOT_REPO_ROOT=/opt/rebot
      - REBOT_GRASP_MODEL=/opt/rebot-models/yoloe-26s-seg-multi.onnx
      - REBOT_GRASP_CONF=0.06
      - REBOT_GRASP_FWD_M=0
      - REBOT_SIDE_INSERT=0.058
      - REBOT_GRASP_INSERT=0.040
      - REBOT_GRASP_OPEN_DIST=0.09
      - REBOT_GRASP_FORCE_BOTTLE=0.8
      - REBOT_FORCE_FIXED_CLASSES=["box","cardboard box","carton","package","water bottle"]
      - REBOT_WIDEBOX_ORBIT=0
      - REBOT_SCAN_POSES=[[0.24,0.00,0.20,0.0,-0.22,0.0],[0.24,0.10,0.20,0.0,-0.22,0.30],[0.24,-0.10,0.20,0.0,-0.22,-0.30]]
      - OBSERVATION_PORT=8775
      - OVS_AGENT_SERVER_LOOP=0
      - CONFIG_DIR=/opt/seeed/voice_rebot_arm/config
    volumes:
      - /dev/bus/usb:/dev/bus/usb                                   # Orbbec camera
      - /run/user/${PULSE_UID:-1000}/pulse/native:/run/pulse/native  # host audio
      - ${PULSE_COOKIE_PATH:-~/.config/pulse/cookie}:/tmp/pulse-cookie:ro
      - /opt/seeed/voice_rebot_arm/config:/opt/seeed/voice_rebot_arm/config
      - /opt/rebot-models:/opt/rebot-models                         # ONNX + hand-eye
    restart: unless-stopped

volumes:
  speech-models:
    name: speech-models
  edgellm-workspace:
  warehouse_data:
    driver: local
