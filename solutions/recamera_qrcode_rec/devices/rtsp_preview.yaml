version: "1.0"
id: rtsp_preview
name: RTSP Video Preview
name_i18n:
  zh: RTSP 视频预览
type: video_stream

video:
  type: rtsp_proxy
  rtsp_url_template: rtsp://{{host}}:8554/live0
  title: reCamera QR video stream
  title_i18n:
    zh: reCamera 二维码识别视频流

data:
  http_url_template: http://{{host}}:8080/api/qr/latest
  interval_ms: 1000

overlay:
  renderer: custom
  script_file: preview/draw_qrcode.js
  dependencies: []

display:
  aspect_ratio: "16:9"
  auto_start: true
  show_stats: true
