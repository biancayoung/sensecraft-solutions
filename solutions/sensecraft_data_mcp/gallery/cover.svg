<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8CC63F"/>
      <stop offset="100%" style="stop-color:#5fa32a"/>
    </linearGradient>
  </defs>

  <rect width="400" height="240" fill="url(#bgGrad)"/>

  <g stroke="#2a2a4a" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="80" y1="0" x2="80" y2="240"/>
    <line x1="160" y1="0" x2="160" y2="240"/>
    <line x1="240" y1="0" x2="240" y2="240"/>
    <line x1="320" y1="0" x2="320" y2="240"/>
  </g>

  <!-- SenseCAP device node -->
  <g transform="translate(60, 70)">
    <rect x="0" y="0" width="44" height="44" rx="6" fill="none" stroke="#3498db" stroke-width="2"/>
    <circle cx="22" cy="22" r="7" fill="#3498db" opacity="0.8"/>
    <text x="22" y="62" text-anchor="middle" fill="#8fa3c0" font-family="Arial, sans-serif" font-size="10">SenseCAP</text>
  </g>

  <!-- MCP bridge node -->
  <g transform="translate(178, 62)">
    <rect x="0" y="0" width="60" height="60" rx="8" fill="none" stroke="url(#accentGrad)" stroke-width="2.5"/>
    <text x="30" y="26" text-anchor="middle" fill="#8CC63F" font-family="Arial, sans-serif" font-size="13" font-weight="bold">MCP</text>
    <text x="30" y="42" text-anchor="middle" fill="#8CC63F" font-family="Arial, sans-serif" font-size="10">bridge</text>
  </g>

  <!-- XiaoZhi / voice assistant node -->
  <g transform="translate(300, 70)">
    <circle cx="22" cy="22" r="22" fill="none" stroke="#e74c3c" stroke-width="2"/>
    <path d="M 12 22 Q 22 10, 32 22 T 12 22" fill="none" stroke="#e74c3c" stroke-width="1.5"/>
    <text x="22" y="62" text-anchor="middle" fill="#8fa3c0" font-family="Arial, sans-serif" font-size="10">XiaoZhi</text>
  </g>

  <!-- Connecting arrows -->
  <path d="M 104 92 L 176 92" fill="none" stroke="#8CC63F" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 238 92 L 298 92" fill="none" stroke="#8CC63F" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#8CC63F"/>
    </marker>
  </defs>

  <text x="200" y="175" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="17" font-weight="bold">
    SenseCAP PaaS MCP Bridge
  </text>
  <text x="200" y="195" text-anchor="middle" fill="#8CC63F" font-family="Arial, sans-serif" font-size="12">
    Device Data as MCP Tools for Voice Assistants
  </text>

  <rect x="100" y="210" width="200" height="3" fill="url(#accentGrad)" rx="1.5"/>
</svg>
